name: Deploy to invoice-bin-zoma.arabcord.com

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync files to remote server
        run: |
          rsync -avz --delete --exclude '.git' --exclude '.github' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Build and restart Docker container
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose down 2>/dev/null || docker-compose down 2>/dev/null || true
            docker ps -aq --filter "name=invoice-bin-zoma" | xargs -r docker rm -f 2>/dev/null || true
            docker ps -q --filter "publish=5000" | xargs -r docker rm -f 2>/dev/null || true
            docker build -t invoice-bin-zoma .
            docker run -d --name invoice-bin-zoma --restart always -p 5000:5000 \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e MASTER_PASSWORD="${{ secrets.MASTER_PASSWORD }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e GPS_USER="${{ secrets.GPS_USER }}" \
              -e GPS_PASS="${{ secrets.GPS_PASS }}" \
              -e GPS_TOKEN="${{ secrets.GPS_TOKEN }}" \
              invoice-bin-zoma
          EOF
