<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ الفواتير الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- استيراد بيانات السائقين -->
    <script src="drivers_data.js"></script>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-main: #1a1a2e;
            --card-radius: 16px;
            --trans: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1A3A5C;
            margin-bottom: 0.5rem;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .header-subtitle {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 2rem;
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            border-radius: var(--card-radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            transition: var(--trans);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card-purple { background-color: #423b87; }
        .card-green { background-color: #115340; }
        .card-blue { background-color: #144579; }
        .card-brown { background-color: #6a2c17; }
        .card-amber { background-color: #714406; }
        .card-olive { background-color: #2e5910; }
        .card-maroon { background-color: #6b223b; }
        .card-gray { background-color: #444444; }

        .card label {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            display: block;
            opacity: 0.95;
        }

        .card input, .card select, .card textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            transition: var(--trans);
            backdrop-filter: blur(5px);
        }
        
        .card input::placeholder, .card textarea::placeholder {
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .card input:focus, .card select:focus, .card textarea:focus {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .card select option {
            background-color: var(--text-main);
            color: white;
        }
        
        .financial-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }
        
        @media (max-width: 600px) {
            .financial-grid { grid-template-columns: 1fr; }
        }

        .btn-submit {
            margin-top: 3rem;
            background: linear-gradient(135deg, #C8A45A 0%, #a88540 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(200, 164, 90, 0.4);
            transition: var(--trans);
            display: inline-flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-submit:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 35px rgba(200, 164, 90, 0.6);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .span-2 { grid-column: span 2; }
        @media (max-width: 768px) {
            .span-2 { grid-column: span 1; }
        }
    </style>
</head>

    <h1 class="header-title">نظام الفواتير الذكي</h1>
    <p class="header-subtitle">اختر السائق وسيتم تعبئة البيانات تلقائياً</p>

    <div class="grid-container">
        <!-- 1. اسم السائق (البحث الذكي) -->
        <div class="card card-purple span-2">
            <label for="driverName">اسم السائق (اكتب للبحث)</label>
            <input type="text" id="driverName" list="driversList" placeholder="ابحث عن اسم السائق هنا..." onchange="autofillDriver()">
            <datalist id="driversList"></datalist>
        </div>

        <!-- 2. نوع السيارة -->
        <div class="card card-green">
            <label for="carType">نوع السيارة</label>
            <input type="text" id="carType" placeholder="مثال: ايسوزو دينا 2024">
        </div>

        <!-- 3. رقم اللوحة -->
        <div class="card card-blue">
            <label for="plateNum">رقم اللوحة</label>
            <input type="text" id="plateNum" list="platesList" placeholder="مثال: ا ب ج 1234" onchange="autofillByPlate()">
            <datalist id="platesList"></datalist>
        </div>

                <!-- 4. نوع الطلب -->
        <div class="card card-brown">
            <label for="requestType">نوع الطلب</label>
            <select id="requestType">
                <option value="صيانة دورية">صيانة دورية</option>
                <option value="إصلاح عطل">إصلاح عطل</option>
                <option value="إصلاح بنشر">إصلاح بنشر</option>
                <option value="تغيير قطع غيار">تغيير قطع غيار</option>
                <option value="غيار زيت">غيار زيت</option>
                <option value="أخرى">أخرى</option>
            </select>
        </div>

        <!-- 4.5. التاريخ -->
        <div class="card card-olive">
            <label for="invoiceDate">التاريخ</label>
            <input type="date" id="invoiceDate">
        </div>
        
        <!-- 5. الكمية والسعر -->
        <div class="card card-maroon span-2">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div>
                    <label for="quantity">الكمية</label>
                    <input type="number" id="quantity" value="1" min="1" oninput="calcTotal()">
                </div>
                <div>
                    <label for="price">السعر الإفرادي (ريال)</label>
                    <input type="number" id="price" placeholder="0.00" oninput="calcTotal()">
                </div>
            </div>
        </div>

        <!-- 6. الوصف -->
        <div class="card card-amber span-2">
            <label for="desc">الوصف / التفاصيل</label>
            <textarea id="desc" rows="3" placeholder="أدخل تفاصيل الفاتورة أو القطع المستبدلة..."></textarea>
        </div>

        <!-- 7. الاجمالي والضريبة -->
        <div class="card card-gray span-2">
            <label>الحسابات المالية</label>
            <div class="financial-grid">
                <div>
                    <span style="font-size:0.9rem; opacity:0.8;">المبلغ</span>
                    <input type="text" id="subtotal" readonly value="0.00" style="background: rgba(0,0,0,0.3); border-color: transparent; margin-top:5px;">
                </div>
                <div>
                    <span style="font-size:0.9rem; opacity:0.8;">الضريبة (15%)</span>
                    <input type="text" id="tax" readonly value="0.00" style="background: rgba(0,0,0,0.3); border-color: transparent; margin-top:5px;">
                </div>
                <div>
                    <span style="font-size:0.9rem; font-weight:bold; color:#f1c40f;">الإجمالي النهائي</span>

    <script>
        // Populate Datalist
        window.onload = function() {
            const list = document.getElementById('driversList');
            const platesList = document.getElementById('platesList');
            if (typeof driversData !== 'undefined') {
                driversData.forEach(d => {
                    if (d.name) {
                        const option = document.createElement('option');
                        option.value = d.name;
                        list.appendChild(option);
                    }
                    if (d.plate && d.plate.trim() !== '' && d.plate !== 'None') {
                        const pOption = document.createElement('option');
                        pOption.value = d.plate;
                        platesList.appendChild(pOption);
                    }
                });
            }
        };

        function autofillDriver() {
            const name = document.getElementById('driverName').value;
            if (typeof driversData !== 'undefined') {
                const driver = driversData.find(d => d.name === name);
                if (driver) {
                    document.getElementById('carType').value = driver.car && driver.car !== 'None' ? driver.car : '';
                    document.getElementById('plateNum').value = driver.plate && driver.plate !== 'None' ? driver.plate : '';
                }
            }
        }

        function autofillByPlate() {
            const plate = document.getElementById('plateNum').value;
            if (typeof driversData !== 'undefined') {
                const driver = driversData.find(d => d.plate === plate);
                if (driver) {
                    document.getElementById('driverName').value = driver.name && driver.name !== 'None' ? driver.name : '';
                    document.getElementById('carType').value = driver.car && driver.car !== 'None' ? driver.car : '';
                }
            }
        }

        window.addEventListener('load', () => { document.getElementById('invoiceDate').valueAsDate = new Date(); });

        function calcTotal() {
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const subtotal = qty * price;
            const tax = subtotal * 0.15;
            const total = subtotal + tax;
            
            document.getElementById('subtotal').value = subtotal.toFixed(2);
            document.getElementById('tax').value = tax.toFixed(2);
            document.getElementById('total').value = total.toFixed(2);
        }

                ws.getRow(r).height = 35; ws.mergeCells(`B${r}:E${r}`);
                const lCell = ws.getCell(`B${r}`);
                lCell.value = lbl; lCell.font = { name: 'Cairo', size: 12, bold: true, color: { argb: color } }; lCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fill } }; lCell.alignment = { horizontal: 'left', vertical: 'middle' }; lCell.border = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
                const vCell = ws.getCell(`F${r}`);
                vCell.value = parseFloat(val); vCell.font = { name: 'Cairo', size: bold ? 14 : 12, bold: bold, color: { argb: color } }; vCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fill } }; vCell.alignment = { horizontal: 'center', vertical: 'middle' }; vCell.border = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder }; vCell.numFmt = '#,##0.00';
            }

            addTotalRow(14, "المبلغ الإجمالي (قبل الضريبة)", subtotal, false, P, 'FFF9FAFB');
            addTotalRow(15, "ضريبة القيمة المضافة (15%)", tax, false, 'FFC0392B', 'FFFFF9F9');
            addTotalRow(16, "المجموع الكلي (مع الضريبة)", total, true, W, P);

            ws.getRow(19).height = 25;
            ws.getCell('B19').value = "توقيع السائق"; ws.getCell('F19').value = "اعتماد الإدارة";
            [ws.getCell('B19'), ws.getCell('F19')].forEach(c => { c.font = { name: 'Cairo', size: 11, bold: true, color: { argb: P } }; c.alignment = { horizontal: 'center', vertical: 'middle' }; });
            ws.getRow(20).height = 40;
            const bBottom = { bottom: { style: 'medium', color: { argb: P } } };
            ws.getCell('B20').border = bBottom; ws.getCell('F20').border = bBottom;

            // Generate
            const buffer = await wb.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            saveAs(blob, `فاتورة_${driver}_${plate}.xlsx`);
        }
    </script>
</body>
</html>
