<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام إدارة الأسطول | شركة بن زومة{% endblock %}</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/logo_192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap">
    
    <!-- Unified Theme -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css', v=1) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='base_styles.css', v=36) }}">
    
    <!-- Global Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    
    <!-- Global Navbar (Can be extended or overridden) -->
    {% block navbar %}
    {% endblock %}

    <!-- Main Content Area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Footer -->
    {% block footer %}
    <footer style="text-align: center; padding: 1.5rem; color: var(--text-muted, #94a3b8); font-size: 0.85rem;">
        &copy; 2026 شركة بن زومة. جميع الحقوق محفوظة. | إصدار 2.0 (Alembic Edition)
    </footer>
    {% endblock %}

    <!-- Common JS -->
    <script defer src="{{ url_for('static', filename='app_ux.js', v=37) }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
