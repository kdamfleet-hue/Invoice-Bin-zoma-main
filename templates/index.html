<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأسطول - بن زومة</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; }
.glass {
background: rgba(15, 23, 42, 0.85);
backdrop-filter: blur(32px);
border: 1px solid rgba(255, 255, 255, 0.1);
box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
}
.nav-link { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.nav-link:hover, .nav-link.active {
background: rgba(59, 130, 246, 0.4);
color: #60a5fa;
transform: translateX(12px);
}
.live-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<div class="flex h-screen overflow-hidden">
<!-- Sidebar فاخر -->
<div id="sidebar" class="glass w-72 h-full flex flex-col border-l border-white/10 shadow-2xl z-50 transition-all lg:translate-x-0 -translate-x-full">
<div class="p-8 border-b border-white/10">
<div class="flex items-center gap-4">
<div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-3xl flex items-center justify-center text-5xl font-bold shadow-inner">BZ</div>
<div>
<h1 class="text-3xl font-bold tracking-tight">إدارة الأسطول</h1>
<p class="text-emerald-400 text-sm flex items-center gap-2"><span class="w-3 h-3 bg-emerald-400 rounded-full live-dot"></span> Live</p>
</div>
</div>
</div>

<nav class="flex-1 p-6 space-y-2 overflow-y-auto">
<a onclick="navigateTo(0)" class="nav-link active flex items-center gap-4 px-6 py-5 rounded-3xl text-lg"><i class="fas fa-tachometer-alt"></i> لوحة القيادة</a>
<a onclick="navigateTo(1)" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl text-lg"><i class="fas fa-calendar-week"></i> الجدول الأسبوعي</a>
<a onclick="navigateTo(6)" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl text-lg"><i class="fas fa-bell"></i> التنبيهات</a>
</nav>
</div>

<!-- Main Content -->
<div class="flex-1 flex flex-col">
<header class="glass h-20 border-b border-white/10 px-8 flex items-center justify-between">
<h1 id="page-title" class="text-3xl font-bold">الجدول الأسبوعي</h1>
</header>

<main class="flex-1 overflow-auto p-8">
<!-- الجدول الأسبوعي الحي -->
<div class="glass rounded-3xl p-6">
<div class="flex justify-between mb-6">
<h2 class="text-2xl font-bold">الرحلات الأسبوعية</h2>
<button onclick="toggleModal(true)" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl flex items-center gap-3">
<i class="fas fa-plus"></i> رحلة جديدة
</button>
</div>
<table id="weekly-table" class="w-full text-right">
<thead class="bg-slate-800">
<tr>
<th class="p-4">رقم الرحلة</th>
<th class="p-4">التاريخ</th>
<th class="p-4">السائق</th>
<th class="p-4">المركبة</th>
<th class="p-4">الحالة</th>
</tr>
</thead>
<tbody id="table-body" class="divide-y divide-slate-700"></tbody>
</table>
</div>
</main>
</div>
</div>

<!-- Modal إضافة رحلة جديدة -->
<div id="addTripModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
  <div class="glass p-8 rounded-3xl w-96 border border-white/10">
    <h2 class="text-xl font-bold mb-4">إضافة رحلة جديدة</h2>
    <form id="tripForm" class="space-y-4">
      <input type="text" id="driver" placeholder="اسم السائق" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10">
      <input type="text" id="vehicle" placeholder="رقم لوحة المركبة" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10">
      <select id="status" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10">
        <option value="مخططة">مخططة</option>
        <option value="جارية">جارية</option>
      </select>
      <div class="flex gap-2">
        <button type="button" onclick="toggleModal(false)" class="flex-1 p-3 bg-slate-700 rounded-xl">إلغاء</button>
        <button type="submit" class="flex-1 p-3 bg-blue-600 rounded-xl">حفظ الرحلة</button>
      </div>
    </form>
  </div>
</div>

<script>
// دالة جلب البيانات من PostgreSQL عبر Flask API
async function fetchWeeklyTrips() {
  try {
    const response = await fetch('/api/weekly-trips');
    if (!response.ok) throw new Error('خطأ في الاتصال بالخادم');
    
    const trips = await response.json();
    const tbody = document.getElementById('table-body');
    
    // رسم الجدول بناءً على البيانات الحقيقية
    tbody.innerHTML = trips.map(t => `
      <tr class="hover:bg-slate-700 transition">
        <td class="p-4">${t.id}</td>
        <td class="p-4">${t.date}</td>
        <td class="p-4">${t.driver}</td>
        <td class="p-4">${t.vehicle}</td>
        <td class="p-4">
          <span class="px-4 py-1 rounded-full ${t.status === 'مكتملة' ? 'bg-emerald-500' : 'bg-amber-500'} text-xs">
            ${t.status}
          </span>
        </td>
      </tr>
    `).join('');
  } catch (error) {
    console.error('فشل في جلب الرحلات:', error);
  }
}

// تحديث حي (Live Update): جلب البيانات الجديدة كل 10 ثوانٍ بصمت
setInterval(fetchWeeklyTrips, 10000);

// جلب البيانات فور تحميل الصفحة
window.onload = () => {
  fetchWeeklyTrips();
};

function toggleModal(show) {
  document.getElementById('addTripModal').classList.toggle('hidden', !show);
}

document.getElementById('tripForm').onsubmit = async (e) => {
  e.preventDefault();
  const data = {
    driver: document.getElementById('driver').value,
    vehicle: document.getElementById('vehicle').value,
    status: document.getElementById('status').value
  };

  await fetch('/api/add-trip', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  
  toggleModal(false);
  fetchWeeklyTrips(); // تحديث الجدول فوراً
};
</script>
</body>
</html>
