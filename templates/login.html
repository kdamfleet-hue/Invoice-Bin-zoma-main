    <!-- Intro Video Splash Screen -->
    <div id="introContainer" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <video id="introVideo" style="width: 100%; height: 100%; object-fit: contain;" autoplay playsinline>
            <source src="{{ url_for('static', filename='login_bg.mp4') }}" type="video/mp4">
        </video>
        <button id="skipIntroBtn" style="position: absolute; bottom: 30px; right: 30px; background: rgba(0,0,0,0.5); color: white; border: 1px solid white; padding: 10px 20px; border-radius: 20px; cursor: pointer; z-index: 10000; font-family: Cairo;">تخطي (Skip)</button>
    </div>

    <script>
        const introContainer = document.getElementById('introContainer');
        const introVideo = document.getElementById('introVideo');
        const skipBtn = document.getElementById('skipIntroBtn');

        function endIntro() {
            introContainer.style.transition = "opacity 1s ease";
            introContainer.style.opacity = "0";
            setTimeout(() => {
                introContainer.style.display = "none";
                introVideo.pause();
            }, 1000);
        }

        introVideo.onended = endIntro;
        skipBtn.onclick = endIntro;
        
        // Browsers might block autoplay if not muted. 
        // We try playing it, if it's blocked, we just end the intro or ask user to click.
        let playPromise = introVideo.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                // Auto-play was prevented.
                introVideo.muted = true;
                introVideo.play().catch(e => endIntro());
            });
        }
    </script>
