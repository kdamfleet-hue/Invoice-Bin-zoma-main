<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تبويب مقفل — BIN ZOMAH INTL.</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base_styles.css', v=11) }}">
    <script defer src="{{ url_for('static', filename='app_ux.js', v=11) }}"></script>
    <script>window.BZ_BRANCH_ID = {{ active_branch_id }}; window.BZ_BRANCH = {{ active_branch|tojson }};</script>
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 24px; box-sizing: border-box;
            background: linear-gradient(135deg, var(--brand-navy, #0C2340) 0%, var(--brand-navy-2, #16335c) 100%);
        }
        .login-card {
            padding: 3rem 2.75rem; border-radius: 24px; text-align: center;
            max-width: 420px; width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,0.45);
        }
        .lock-ico { font-size: 3rem; margin-bottom: 8px; }
        .login-card h2 { margin: 0 0 6px; color: var(--text-primary); font-size: 1.7rem; font-weight: 800; }
        .login-card .brand-line { color: var(--accent); font-weight: 900; letter-spacing: 1px; font-size: 0.9rem; margin-bottom: 16px; }
        .login-card p.subtitle { color: var(--text-muted); margin-bottom: 1.6rem; font-size: 1rem; line-height: 1.6; }
        .login-form { display: flex; flex-direction: column; gap: 6px; text-align: right; }
        .login-form label { color: var(--text-primary); font-weight: 700; margin-top: 6px; font-size: 0.95rem; }
        .login-form button[type="submit"] { margin-top: 18px; width: 100%; font-size: 1.05rem; padding: 12px; }
        .back-link { display:inline-block; margin-top: 14px; color: var(--text-muted); text-decoration: none; font-size: .9rem; }
        .back-link:hover { color: var(--accent); }
        .login-error {
            margin-top: 14px; text-align: center; font-weight: 700; color: var(--danger, #ef4444);
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px; padding: 10px; font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="login-card glass-surface">
        <div class="lock-ico">🔒</div>
        <h2>تبويب مقفل</h2>
        <div class="brand-line">BIN ZOMAH INTL.</div>
        <p class="subtitle">هذا التبويب محمي. أدخل كلمة المرور للمتابعة.</p>
        <form method="POST" action="{{ action or '/importantworkstation/unlock' }}" class="login-form">
            <input type="hidden" name="next" value="{{ next }}">
            <label for="password">كلمة المرور</label>
            <input id="password" type="password" name="password" placeholder="أدخل كلمة المرور" autocomplete="off" autofocus required>
            <button type="submit" class="btn-primary">🔓 فتح القفل</button>
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
        </form>
        <a href="/" class="back-link">← العودة للرئيسية</a>
    </div>
</body>
</html>
