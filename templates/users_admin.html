{% extends "base.html" %}
{% block title %}إدارة المستخدمين{% endblock %}
{% block content %}
<div style="padding: 20px;">
    <h2>إدارة مستخدمي النظام والصلاحيات</h2>
    <div style="background: var(--bg-panel); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <form id="userForm">
            <input type="hidden" id="userId">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <input type="text" id="username" placeholder="اسم المستخدم" required>
                <input type="password" id="password" placeholder="كلمة المرور (اختياري عند التعديل)">
                <select id="role" required>
                    <option value="" disabled selected>-- اختر الصلاحية --</option>
                    <option value="admin">مدير عام (Admin)</option>
                    <option value="branch_manager">مدير فرع (Branch Manager)</option>
                    <option value="data_entry">مدخل بيانات (Data Entry)</option>
                    <option value="viewer">عرض فقط (Viewer)</option>
                    <option value="kiosk">شاشة الورشة (Kiosk)</option>
                </select>
                <select id="branch_id">
                    <option value="">كل الفروع (عام)</option>
                    <!-- سيتم تعبئة الفروع لاحقاً -->
                </select>
                <label style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="is_active" checked>
                    الحساب مفعل
                </label>
            </div>
            <button type="submit" class="chip" style="background: var(--accent-primary); color: white;">حفظ المستخدم</button>
        </form>
    </div>

    <table class="fd-table">
        <thead>
            <tr>
                <th>المعرف</th>
                <th>اسم المستخدم</th>
                <th>الصلاحية</th>
                <th>الفرع</th>
                <th>الحالة</th>
                <th>آخر دخول</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody id="usersList">
            <!-- Data will be loaded here -->
        </tbody>
    </table>
</div>

<script>
function loadUsers() {
    fetch('/api/users')
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('usersList');
        tbody.innerHTML = '';
        data.users.forEach(u => {
            const roleMap = {
                'admin': 'مدير عام',
                'branch_manager': 'مدير فرع',
                'data_entry': 'مدخل بيانات',
                'viewer': 'عرض فقط',
                'kiosk': 'شاشة ورشة'
            };
            const activeBadge = u.is_active ? '<span class="badge ok">مفعل</span>' : '<span class="badge bad">موقوف</span>';
            tbody.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${roleMap[u.role] || u.role}</td>
                    <td>${u.branch}</td>
                    <td>${activeBadge}</td>
                    <td>${u.last_login}</td>
                    <td>
                        <button class="chip" onclick="editUser(${u.id}, '${u.username}', '${u.role}', '${u.branch_id}', ${u.is_active})">تعديل</button>
                        ${u.username !== 'admin' ? `<button class="chip" style="background:#dc3545;color:white;" onclick="deleteUser(${u.id})">حذف</button>` : ''}
                    </td>
                </tr>
            `;
        });
    });
}

function loadBranches() {
    fetch('/api/legacy/branches')
    .then(r => r.json())
    .then(data => {
        const sel = document.getElementById('branch_id');
        (data.branches || data).forEach(b => {
            sel.innerHTML += `<option value="${b.id}">${b.name}</option>`;
        });
    }).catch(e => console.log("Branches API not found, or returns different format."));
}

function editUser(id, username, role, branch_id, is_active) {
    document.getElementById('userId').value = id;
    document.getElementById('username').value = username;
    document.getElementById('role').value = role;
    document.getElementById('branch_id').value = branch_id !== 'null' ? branch_id : '';
    document.getElementById('is_active').checked = is_active;
    document.getElementById('username').readOnly = true;
}

function deleteUser(id) {
    if(!confirm("هل أنت متأكد من حذف هذا المستخدم؟")) return;
    fetch('/api/users', {
        method: 'DELETE',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: id})
    }).then(r => r.json()).then(data => {
        if(data.success) loadUsers();
        else alert(data.error);
    });
}

document.getElementById('userForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
        branch_id: document.getElementById('branch_id').value,
        is_active: document.getElementById('is_active').checked
    };
    
    fetch('/api/users', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(r => r.json()).then(data => {
        if(data.success) {
            alert("تم الحفظ بنجاح");
            document.getElementById('userForm').reset();
            document.getElementById('username').readOnly = false;
            document.getElementById('userId').value = '';
            loadUsers();
        } else {
            alert(data.error || data.reason);
        }
    });
});

window.onload = () => {
    loadUsers();
    loadBranches();
};
</script>
{% endblock %}
